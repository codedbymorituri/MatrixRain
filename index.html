<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain</title>
  <link rel="stylesheet" href="css\styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <div class="settings-panel">
      <div class="settings-controls">

        <div class="slider">
          <label>Font</label>
          <input type="range" id="font-size-slider" min="8" max="32" value="16" step="1">
          <span id="font-size-value">16px</span>
        </div>

        <div class="slider">
          <label>Speed</label>
          <input type="range" id="fall-speed-slider" min="1" max="20" value="10" step="1">
          <span id="fall-speed-value">10</span>
        </div>

        <div class="slider">
          <label>Trail</label>
          <input type="range" id="trail-length-slider" min="4" max="96" value="48" step="1">
          <span id="trail-length-value">48</span>
        </div>
      </div>

      <button id="start-button" class="button">Start</button>
    </div>
  </div>
</body>
    <script src="javascript\Symbol.js"></script>
    <script src="javascript\Effect.js"></script>
    <script src="javascript\MatrixRain.js"></script>
    <script src="javascript\Settings.js"></script>
</html>
